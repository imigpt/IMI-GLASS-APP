<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>IMI Glasses 3D</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111111;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: transparent;
      --progress-bar-color: #00D9FF;
      --progress-bar-height: 2px;
    }
    .hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      font-family: sans-serif;
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 20px;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111111;
      transition: opacity 0.6s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0,217,255,0.2);
      border-top-color: #00D9FF;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: rgba(255,255,255,0.6);
      font-family: sans-serif;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="models/imi_mark1.glb"
    alt="IMI Mark 1 Smart Glasses"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="30deg"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    shadow-softness="0.8"
    exposure="1.1"
    environment-image="neutral"
    tone-mapping="neutral"
    interaction-prompt="none">
  </model-viewer>

  <div class="hint">Drag to rotate &nbsp;·&nbsp; Pinch to zoom</div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading IMI Glasses…</div>
  </div>

  <script>
    const viewer = document.querySelector('#viewer');
    const overlay = document.getElementById('loadingOverlay');
    viewer.addEventListener('load', () => {
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 700);
    });
    viewer.addEventListener('error', () => {
      document.querySelector('.loading-text').textContent = 'Failed to load model';
    });
  </script>
</body>
</html>
