# --------------------------
# Memory & Performance
# --------------------------
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m
org.gradle.workers.max=2

# Enable configuration cache (makes build MUCH faster)
org.gradle.configuration-cache=true

# Enable parallel build
org.gradle.parallel=true


# --------------------------
# AndroidX & Jetifier
# --------------------------
android.useAndroidX=true

# Jetifier required ONLY if old support libraries exist.
# Your project uses modern dependencies ? KEEP IT FOR NOW.
android.enableJetifier=true


# --------------------------
# Kotlin & Compose
# --------------------------
kotlin.code.style=official

# Reduces R class size - good for performance
android.nonTransitiveRClass=true


# --------------------------
# Gradle Behavior
# --------------------------
# Avoid build failures because of metadata mismatch
# android.disableAutomaticComponentCreation=false  <-- Removed deprecated property

# Speed up resource processing
android.enableAppCompileTimeRClass=true
